<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property='og:title' content='>Will You Be My Godparent? — Ola's Invitation'/>
    <meta property='og:image' content='assets/ola-1.jpeg'/>
    <meta property='og:description' content='Inaanyayahan Ka Namin!'/>
    <meta property=’og:url’ content='https://aquiambao03.github.io/Ola-Christening/'/>
    <meta property='og:image:width' content='1200' />
    <meta property='og:image:height' content='627' />
    <meta property="og:type" content='website'/>

    <title>Ola Dashboard</title>
    <link rel="icon" type="image/x-icon" href="./assets/flower.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#f8f7f4;
}

.stat-card{
  border:none;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.table-card{
  border:none;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

.section-title{
  font-weight:700;
}

.message-cell{
  max-width:300px;
  white-space:normal;
}
</style>

</head>
<body>

<div class="container py-5">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">

    <div>
        <h1>🌿 Ola Dashboard</h1>
        <p class="text-muted mb-0">
        Invitation responses and blessing wall entries
        </p>
    </div>

    <div class="d-flex gap-2">
        <button class="btn btn-success" id="exportBtn">
        Export Acceptances
        </button>

        <button class="btn btn-primary" id="refreshBtn">
        Refresh
        </button>
    </div>

</div>

  <!-- STATS -->
  <div class="row g-4 mb-5">

    <div class="col-md-6">
      <div class="card stat-card">
        <h6>Total Acceptances</h6>
        <h2 id="acceptanceCount">0</h2>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card stat-card">
        <h6>Total Blessings</h6>
        <h2 id="blessingCount">0</h2>
      </div>
    </div>

  </div>

  <!-- ACCEPTANCES -->
  <div class="card table-card mb-5">

    <div class="card-header bg-white">
      <h4 class="section-title mb-0">
        Godparent Acceptances
      </h4>
    </div>

    <div class="p-3 bg-white">

        <input
            type="text"
            id="acceptanceSearch"
            class="form-control"
            placeholder="Search by name or email..."
        >

    </div>

    <div class="table-responsive">

      <table class="table table-striped mb-0">

        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Message</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="acceptanceTable"></tbody>

      </table>

    </div>

  </div>

  <!-- BLESSINGS -->
  <div class="card table-card">

    <div class="card-header bg-white">
      <h4 class="section-title mb-0">
        Blessing Wall
      </h4>
    </div>

    <div class="p-3 bg-white">
        <input
            type="text"
            id="blessingSearch"
            class="form-control"
            placeholder="Search blessing..."
        >
    </div>

    <div class="table-responsive">

      <table class="table table-striped mb-0">

        <thead>
          <tr>
            <th>Icon</th>
            <th>Name</th>
            <th>Message</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="blessingTable"></tbody>

      </table>

    </div>

  </div>

</div>

<script src="config.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
